complexity:
  LongMethod:
    threshold: 20
  CyclomaticComplexity:
    threshold: 10
  LongParameterList:
    threshold: 5
  TooManyFunctions:
    threshold: 15

style:
  ForbiddenComment:
    values: ['TODO', 'FIXME']
  MaxLineLength:
    maxLineLength: 120
  WildcardImport:
    active: true

potential-bugs:
  UnsafeCallOnNullableType:
    active: true  # !! の検出

naming:
  FunctionNaming:
    functionPattern: '[a-z][a-zA-Z0-9]*'
  ClassNaming:
    classPattern: '[A-Z][a-zA-Z0-9]*'
  PackageNaming:
    packagePattern: '[a-z][a-z0-9]*(\.[a-z][a-z0-9]*)*'
